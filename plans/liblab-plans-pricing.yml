specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Liblab
providerId: liblab
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - SDK Generation
  - Code Generation
  - OpenAPI
  - MCP
  - Developer Tools
description: >-
  Commercial plans for Liblab's SDK Generator, MCP Generator, and supporting
  developer-experience tooling. Liblab does not bill on a request-per-API
  basis the way an API provider does; it bills on SDK builds, target
  languages, MCP server calls, and seats. Verified against
  https://liblab.com/pricing (MCP tier) and the docs/portal. SDK Generator
  pricing is sales-led and not published; values below marked "contact"
  reflect that.
plans:
  - id: liblab-sdk-starter
    name: SDK Generator - Starter / Trial
    type: freemium
    description: >-
      Entry-level access to the liblab SDK Generator for evaluation. Lets
      a developer connect a single OpenAPI/Postman spec, run the CLI, and
      generate SDKs in supported target languages via the hosted portal.
    entries:
      - label: Spec Inputs
        description: Number of API specifications a workspace may register
        name: specs
        type: quota
        metric: specs
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: SDK Languages
        description: Target SDK languages available on the trial tier
        name: languages
        type: quota
        metric: languages
        limit: 7
        timeFrame: forever
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Hosted Portal Access
      - name: liblab CLI
      - name: TypeScript / Python / Java / .NET / Go / PHP / Terraform Targets
      - name: Community Support
  - id: liblab-sdk-business
    name: SDK Generator - Business
    type: paid
    description: >-
      Production tier for teams shipping SDKs to customers. Includes
      automated CI/CD publishing via the liblab-sdk-updates GitHub Action,
      generated documentation, and customization hooks. Pricing is
      sales-led and not published on the liblab pricing page.
    entries:
      - label: Seats
        description: Number of liblab portal users (contact sales)
        name: seats
        type: quota
        metric: seats
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: contact
        userMultiplied: true
      - label: Specs
        description: API specifications under management (contact sales)
        name: specs
        type: quota
        metric: specs
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: contact
        userMultiplied: false
    elements:
      - name: All 7 SDK Targets
      - name: CI/CD Auto-Publish (GitHub Action)
      - name: Customization Hooks
      - name: Generated SDK Documentation
      - name: Email Support
  - id: liblab-sdk-enterprise
    name: SDK Generator - Enterprise
    type: enterprise
    description: >-
      Custom-negotiated tier for enterprises with security, compliance,
      and data-residency requirements. Includes named TAM, contractual
      SLAs, and on-prem / private-tenancy options.
    entries:
      - label: Volume
        description: Negotiated SDK build volume and language targets
        name: builds
        type: quota
        metric: builds
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Dedicated Account Manager
      - name: Contractual SLA
      - name: Security & Compliance Review (SOC2)
      - name: SSO / SAML
      - name: Private Tenancy Options
      - name: 24/7 Support
  - id: liblab-mcp-free
    name: MCP Generator - Free Tier
    type: freemium
    description: >-
      First-year free tier for the liblab MCP Generator. Caps usage at
      100 MCP calls per month. Source: liblab.com/pricing - "FREE 100 MCP
      calls each month" / "Free tier (100 calls/month) available for first
      year only."
    entries:
      - label: MCP Calls
        description: Monthly MCP server invocations included free
        name: mcp_calls
        type: quota
        metric: calls
        limit: 100
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Private & Secure MCP Server
      - name: Downloadable MCP Files
      - name: OpenAPI / Swagger / Postman Inputs
      - name: Claude / Cursor / OpenAI Client Compatibility
  - id: liblab-mcp-payg
    name: MCP Generator - Pay-As-You-Go
    type: usage
    description: >-
      Metered tier for the liblab MCP Generator. Verbatim from
      liblab.com/pricing - "$5 for every 100 calls."
    entries:
      - label: MCP Calls
        description: Metered MCP server invocations
        name: mcp_calls
        type: metered
        metric: calls
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 100
        price: '5.00'
        userMultiplied: false
    elements:
      - name: No Commitment, Cancel Anytime
      - name: Private & Secure
      - name: All MCP Client Targets
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
