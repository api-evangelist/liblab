aid: liblab
name: Liblab
segments:
  - SDKs
  - Code Generation
  - Developer Tools
  - MCP
description: >-
  liblab generates and publishes type-safe, idiomatic SDKs in TypeScript,
  Python, Java, .NET, Go, PHP, and Terraform from OpenAPI/Swagger/Postman
  specs, plus MCP servers that expose those APIs to AI agents. The platform
  ships a CLI, hosted portal, and CI/CD GitHub Action that publish SDKs to
  customer repos via pull requests. liblab joined Postman in November 2025
  to complete the API lifecycle.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - SDKs
  - SDK Generation
  - Code Generation
  - OpenAPI
  - Developer Tools
  - MCP
  - AI Agents
  - Postman
  - Terraform
  - Developer Experience
created: '2026-03-03'
modified: '2026-05-22'
url: https://raw.githubusercontent.com/api-evangelist/liblab/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: liblab:liblab
    name: Liblab SDK Generator
    description: >-
      Cloud-based generator that produces customizable, type-safe SDKs in
      seven target stacks (TypeScript, Python, Java, .NET, Go, PHP,
      Terraform) from OpenAPI 2.0/3.0/3.1 or Postman Collections. CLI and
      CI/CD workflows publish SDKs to customer GitHub repos as pull
      requests.
    humanURL: https://liblab.com/
    tags:
      - SDK Generation
      - Code Generation
      - OpenAPI
      - CLI
      - CI/CD
    properties:
      - type: Documentation
        url: https://liblab.com/docs
      - type: GettingStarted
        url: https://liblab.com/docs/get-started/quickstart-generate-sdk
      - type: Portal
        url: https://app.liblab.com/
      - type: Hub
        url: https://hub.liblab.com/
      - type: CLI
        url: https://liblab.com/docs/cli/cli-overview
      - type: GitHubAction
        url: https://github.com/liblaber/liblab-sdk-updates
      - type: SampleAPI
        url: https://github.com/liblaber/simple-petstore-openapi
  - aid: liblab:mcp-generator
    name: Liblab MCP Generator
    description: >-
      Generates a complete Model Context Protocol (MCP) server from an
      OpenAPI, Swagger, or Postman spec so AI chat clients (Claude,
      Cursor, OpenAI) can call the underlying API in natural language.
      Launched June 2025; first-year free tier covers 100 MCP calls per
      month, then $5 per 100 calls.
    humanURL: https://liblab.com/blog/mcp-generator
    tags:
      - MCP
      - AI Agents
      - Model Context Protocol
      - OpenAPI
    properties:
      - type: Announcement
        url: https://liblab.com/blog/2025-06-24-introducing-liblab-mcp-generator
      - type: BlogPost
        url: https://liblab.com/blog/mcp-generator
      - type: Pricing
        url: https://liblab.com/pricing
  - aid: liblab:hub
    name: Liblab Hub
    description: >-
      Public catalog of pre-generated SDKs (Python, TypeScript, C#, PHP)
      for popular third-party APIs (Postman, RingCentral, NYT, UPS, NHL,
      Pinnacle, OpenHue, Skyscanner, Voyado, Booking, etc.) used to
      demonstrate generator output quality. Free to use.
    humanURL: https://hub.liblab.com/
    tags:
      - SDKs
      - Hub
      - Catalog
    properties:
      - type: Hub
        url: https://hub.liblab.com/
  - aid: liblab:terraform-provider
    name: Liblab Terraform Provider Generator
    description: >-
      Generates a Terraform provider from an OpenAPI specification,
      enabling Infrastructure-as-Code workflows against any documented
      API.
    humanURL: https://liblab.com/docs
    tags:
      - Terraform
      - Infrastructure
      - Code Generation
