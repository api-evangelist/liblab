specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Liblab
providerId: liblab
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - SDK Generation
  - MCP
  - Code Generation
  - Quotas
  - Rate Limiting
description: >-
  Rate-limit and quota policies for Liblab's commercial surface. Because
  liblab is an SDK and MCP generator (not a transactional API), the only
  customer-facing throughput limit currently published is the MCP
  Generator's monthly call quota. SDK Generator throughput limits (builds,
  PRs, seats) are sales-led and not published. Sources:
  https://liblab.com/pricing and the MCP Generator product docs.
headers:
  limit: not-published
  remaining: not-published
  reset: not-published
  retryAfter: Retry-After
  policy: not-published
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: mcp-free
    name: MCP Generator Free Tier Monthly Quota
    scope: workspace
    metric: mcp_calls_per_month
    limit: 100
    timeFrame: month
    applies:
      - Liblab MCP Generator
    notes: >-
      First-year free tier only. Verbatim from liblab.com/pricing:
      "FREE 100 MCP calls each month" / "Free tier (100 calls/month)
      available for first year only."
  - tier: mcp-payg
    name: MCP Generator Pay-As-You-Go
    scope: workspace
    metric: mcp_calls_per_month
    limit: -1
    timeFrame: month
    applies:
      - Liblab MCP Generator
    notes: >-
      No hard ceiling; billed at $5 per 100 calls. Verbatim from
      liblab.com/pricing: "$5 for every 100 calls."
  - tier: sdk-business
    name: SDK Generator Business Throughput
    scope: workspace
    metric: builds_per_month
    limit: not-published
    timeFrame: month
    applies:
      - Liblab SDK Generator
    notes: >-
      Build volume, seat counts, and spec counts are negotiated with
      liblab sales; no public throughput cap is documented.
  - tier: sdk-enterprise
    name: SDK Generator Enterprise Throughput
    scope: contract
    metric: builds_per_month
    limit: -1
    timeFrame: month
    applies:
      - Liblab SDK Generator
    notes: Negotiated contractually; fair-use applies.
policies:
  - name: MCP Call Accounting
    description: >-
      One MCP call equals one tool invocation against a generated MCP
      server. Failed calls and client-side retries may still count
      against quota depending on workspace configuration.
  - name: Backoff Strategy
    description: >-
      Clients should implement exponential backoff with jitter and honor
      Retry-After headers when present.
  - name: Quota Reset
    description: >-
      MCP monthly quotas reset at the start of each billing cycle (UTC).
  - name: Fair Use
    description: >-
      Enterprise plans subject to fair-use throttling against shared
      generator infrastructure.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
