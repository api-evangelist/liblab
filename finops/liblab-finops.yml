specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Liblab
providerId: liblab
publisherName: Liblab (a Postman company)
serviceCategory: Developer Tools / SDK Generation
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - SDK Generation
  - MCP
  - Code Generation
  - Developer Tools
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view of Liblab. Liblab is an SDK-generation and
  MCP-server-generation platform; cost is driven primarily by (a) metered
  MCP calls against generated MCP servers and (b) contracted SDK-generation
  seats / build volumes negotiated with sales. There is no public per-API
  request meter the way a transactional API would have. liblab joined
  Postman in November 2025, so future billing surfaces may consolidate
  under the Postman invoice.
principles:
  - name: Visibility
    description: >-
      Show MCP-call consumption per workspace and per generated server so
      product, engineering, and finance can see who is driving AI-agent
      usage of the underlying API.
  - name: Allocation
    description: >-
      Tag each MCP server (and the SDK pipeline that fed it) with the
      consuming team, application, and downstream API so cost can be
      chargedback to the right business owner.
  - name: Optimization
    description: >-
      Evaluate SDK target-language scope, MCP call patterns (caching,
      batching, prompt design), and tier selection to reduce $-per-useful
      agent action.
  - name: Accountability
    description: >-
      Set budget owners per generated MCP server and per SDK repo, with
      monthly chargeback or showback to the consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Usage-Based + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Liblab
  ServiceCategory: Developer Tools / SDK Generation
  ProviderName: Liblab
  PublisherName: Liblab (a Postman company)
  InvoiceIssuerName: Liblab
  PricingCategory: Usage-Based + Subscription
  PricingUnit: mcp_call OR sdk_seat
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: mcp_calls
    description: Count of billable MCP server invocations
    unit: call
    aggregation: sum
    dimensions:
      - workspace
      - mcp_server
      - underlying_api
      - client
      - tier
  - name: sdk_builds
    description: Count of SDK builds run via portal or CI/CD (contract-metered)
    unit: build
    aggregation: sum
    dimensions:
      - workspace
      - spec
      - language
      - environment
  - name: sdk_seats
    description: Active liblab portal seats (contract-metered)
    unit: seat
    aggregation: avg
    dimensions:
      - workspace
      - role
  - name: target_languages
    description: Distinct SDK target languages generated per workspace
    unit: language
    aggregation: countDistinct
    dimensions:
      - workspace
      - spec
apis:
  - name: Liblab SDK Generator
    baseURL: https://app.liblab.com/
    tags:
      - SDK Generation
      - CLI
      - CI/CD
    serviceName: Liblab SDK Generator
    serviceCategory: Developer Tools
  - name: Liblab MCP Generator
    baseURL: https://liblab.com/blog/mcp-generator
    tags:
      - MCP
      - AI Agents
    serviceName: Liblab MCP Generator
    serviceCategory: AI / MCP
unitEconomics:
  - name: Cost per 100 MCP Calls
    metric: billed_cost / (mcp_calls / 100)
    target: '5.00'
    notes: Matches published PAYG price ($5 / 100 calls).
  - name: Cost per SDK Build
    metric: billed_cost / sdk_builds
    target: contract-defined
  - name: Cost per Active Seat
    metric: billed_cost / sdk_seats
    target: contract-defined
  - name: MCP Calls per Active Agent
    metric: mcp_calls / active_agents
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
